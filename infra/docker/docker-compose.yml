services:
  postgres:
    image: postgres:16-alpine
    container_name: labvault-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_SUPERUSER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_SUPERUSER_PASSWORD:-postgres}
      - POSTGRES_APP_DB=${POSTGRES_APP_DB:-labvault}
      - POSTGRES_APP_USER=${POSTGRES_APP_USER:-labvault}
      - POSTGRES_APP_PASSWORD=${POSTGRES_APP_PASSWORD:-labvault_password}
      - POSTGRES_KEYCLOAK_DB=${POSTGRES_KEYCLOAK_DB:-keycloak}
      - POSTGRES_KEYCLOAK_USER=${POSTGRES_KEYCLOAK_USER:-keycloak}
      - POSTGRES_KEYCLOAK_PASSWORD=${POSTGRES_KEYCLOAK_PASSWORD:-keycloak_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - labvault

  redis:
    image: redis:7-alpine
    container_name: labvault-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - labvault

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: labvault-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - labvault

  keycloak:
    image: quay.io/keycloak/keycloak:26.2.5
    container_name: labvault-keycloak
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: start-dev --http-port=8080
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_KEYCLOAK_DB:-keycloak}
      KC_DB_USERNAME: ${POSTGRES_KEYCLOAK_USER:-keycloak}
      KC_DB_PASSWORD: ${POSTGRES_KEYCLOAK_PASSWORD:-keycloak_password}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin123}
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    networks:
      - labvault

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  labvault:
    driver: bridge
